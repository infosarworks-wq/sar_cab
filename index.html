<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SAR Cabinets Showcase</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.css" />
  <style>
    :root {
      --ui-bg: rgba(20, 20, 22, 0.82);
      --dot: #f5f5f5;
      --dot-active: #e53935;
      --border: rgba(255, 255, 255, 0.15);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #111;
      color: #eee;
      overflow: hidden;
    }
    #viewer { width: 100%; height: 100%; }
    .chrome {
      position: fixed;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .chrome-inner {
      pointer-events: auto;
      background: var(--ui-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }
    .photo-inner {
      flex-direction: column;
      align-items: stretch;
      border-radius: 16px;
      padding: 10px 14px;
      gap: 8px;
      min-width: min(560px, 90vw);
    }
    #viewBar { top: 16px; }
    #photoBar { bottom: 38px; }
    .label {
      font-size: 12px;
      opacity: 0.75;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 4px;
    }
    .dots {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: min(90vw, 720px);
    }
    button.dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.5);
      background: var(--dot);
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
    }
    button.dot:hover { transform: scale(1.15); }
    button.dot.active {
      background: var(--dot-active);
      border-color: #ff7961;
      box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.35);
    }
    #photoSlider {
      width: 100%;
      accent-color: var(--dot-active);
    }
    .slider-hint {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.9;
      user-select: none;
    }
    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      background: var(--ui-bg);
      border: 1px solid var(--border);
      padding: 20px 28px;
      border-radius: 12px;
      max-width: 90vw;
      text-align: center;
      line-height: 1.5;
    }
    #status.error { border-color: #c62828; }
    #status.hidden { display: none; }
  </style>
</head>
<body>
  <div id="status">Loading…</div>
  <div id="viewer"></div>

  <div id="viewBar" class="chrome" style="display:none;">
    <div class="chrome-inner">
      <span class="label">Views</span>
      <div id="viewDots" class="dots"></div>
    </div>
  </div>

  <div id="photoBar" class="chrome" style="display:none;">
    <div class="chrome-inner photo-inner">
      <span class="slider-hint">slide to open cabinets</span>
      <input type="range" id="photoSlider" min="0" max="0" value="0" />
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import { Viewer } from "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.module.js";

    const BUCKET_BASE = "https://storage.googleapis.com/sar_cab";
    const MAX_VIEW_SCAN = 80;
    const MAX_PHOTO_SCAN = 500;

    let viewer = null;
    let loadToken = 0;
    const preparedCache = new Map();
    let inFlightLoad = null;
    let queuedLoad = null;

    const state = {
      project: getQueryParam("project"),
      views: [],
      photosPerView: [],
      currentView: 0,
      currentPhoto: 0
    };

    if (!state.project) {
      showError(
        'Missing <strong>?project=</strong> in the link.<br><br>' +
        '<code>https://infosarworks-wq.github.io/sar_cab/?project=sample-cabinets</code>'
      );
      throw new Error("Missing ?project");
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return (params.get(name) || "").trim();
    }

    function showError(html) {
      const el = document.getElementById("status");
      el.className = "error";
      el.innerHTML = html;
    }

    function hideStatus() {
      document.getElementById("status").className = "hidden";
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function buildUrl(project, viewFolder, fileName) {
      const base = BUCKET_BASE.replace(/\/+$/, "");
      return base + "/" + [project, viewFolder, fileName].map((s) => encodeURIComponent(String(s))).join("/");
    }

    function photoFileName(i, spaceBeforeDot) {
      return spaceBeforeDot ? `${i} .png` : `${i}.png`;
    }

    async function resourceExists(url) {
      try {
        const r = await fetch(url, { method: "HEAD", mode: "cors", credentials: "omit" });
        if (r.ok) return true;
        if (r.status === 404) return false;
        const r2 = await fetch(url, { method: "GET", mode: "cors", credentials: "omit" });
        if (!r2.ok) return false;
        if (r2.body && r2.body.cancel) r2.body.cancel();
        return true;
      } catch {
        return false;
      }
    }

    async function discoverViews(project) {
      const views = [];
      let missesInARow = 0;
      for (let i = 1; i <= MAX_VIEW_SCAN; i++) {
        const folder = `view-${i}`;
        const plain = await resourceExists(buildUrl(project, folder, "1.png"));
        if (plain) {
          views.push({ index: i, spaceBeforeDot: false });
          missesInARow = 0;
          continue;
        }
        const spaced = await resourceExists(buildUrl(project, folder, "1 .png"));
        if (spaced) {
          views.push({ index: i, spaceBeforeDot: true });
          missesInARow = 0;
          continue;
        }
        missesInARow += 1;
        if (views.length > 0 && missesInARow >= 2) break;
      }
      return views;
    }

    async function countPhotosInView(project, viewIndex, spaceBeforeDot) {
      let n = 0;
      for (let i = 1; i <= MAX_PHOTO_SCAN; i++) {
        const ok = await resourceExists(buildUrl(project, `view-${viewIndex}`, photoFileName(i, spaceBeforeDot)));
        if (!ok) break;
        n = i;
      }
      return n;
    }

    function currentImageUrl() {
      const meta = state.views[state.currentView];
      return buildUrl(
        state.project,
        `view-${meta.index}`,
        photoFileName(state.currentPhoto + 1, meta.spaceBeforeDot)
      );
    }

    async function preparePanorama(url) {
      const res = await fetch(url, { mode: "cors", credentials: "omit" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob = await res.blob();
      return { url: URL.createObjectURL(blob) };
    }

    function getPreparedPanorama(url) {
      if (!preparedCache.has(url)) {
        preparedCache.set(url, preparePanorama(url));
      }
      return preparedCache.get(url);
    }

    async function preloadAllPanoramas() {
      const urls = [];
      for (let vi = 0; vi < state.views.length; vi++) {
        const meta = state.views[vi];
        const count = state.photosPerView[vi];
        for (let p = 1; p <= count; p++) {
          urls.push(buildUrl(state.project, `view-${meta.index}`, photoFileName(p, meta.spaceBeforeDot)));
        }
      }
      const workers = Array.from({ length: 4 }, async (_, idx) => {
        for (let i = idx; i < urls.length; i += 4) {
          try {
            await getPreparedPanorama(urls[i]);
          } catch (e) {
            // Ignore preload failures; explicit loads still show useful errors.
          }
        }
      });
      await Promise.all(workers);
    }

    async function runPanoramaLoad(url, preserve, token) {
      const position = preserve && viewer ? viewer.getPosition() : null;
      const zoom = preserve && viewer ? viewer.getZoomLevel() : null;
      const prepared = await getPreparedPanorama(url);
      if (token !== loadToken) return;

      if (!viewer) {
        viewer = new Viewer({
          container: document.getElementById("viewer"),
          panorama: prepared.url,
          navbar: ["zoom", "move", "fullscreen"],
          loadingImg: null
        });
        return;
      }

      await viewer.setPanorama(prepared.url, {
        transition: false,
        showLoader: false,
        position: position || undefined,
        zoom: zoom || undefined
      });
    }

    function loadPanorama(url, preserve) {
      const token = ++loadToken;
      queuedLoad = { url, preserve, token };
      if (inFlightLoad) return inFlightLoad;

      inFlightLoad = (async () => {
        while (queuedLoad) {
          const next = queuedLoad;
          queuedLoad = null;
          try {
            await runPanoramaLoad(next.url, next.preserve, next.token);
          } catch (err) {
            if (next.token !== loadToken) continue;
            showError(
              'Could not load this image.<br><br><code style="word-break:break-all;">' +
              escapeHtml(next.url) +
              "</code><br><br>" +
              escapeHtml(String(err && err.message ? err.message : err))
            );
          }
        }
      })().finally(() => {
        inFlightLoad = null;
      });

      return inFlightLoad;
    }

    function renderViewDots() {
      const wrap = document.getElementById("viewDots");
      wrap.innerHTML = "";
      if (state.views.length <= 1) {
        document.getElementById("viewBar").style.display = "none";
        return;
      }
      document.getElementById("viewBar").style.display = "flex";
      for (let i = 0; i < state.views.length; i++) {
        const b = document.createElement("button");
        b.className = "dot" + (i === state.currentView ? " active" : "");
        b.addEventListener("click", () => {
          state.currentView = i;
          state.currentPhoto = 0;
          loadPanorama(currentImageUrl(), false);
          renderViewDots();
          renderPhotoControls();
        });
        wrap.appendChild(b);
      }
    }

    function renderPhotoControls() {
      const count = state.photosPerView[state.currentView];
      const slider = document.getElementById("photoSlider");
      slider.min = "0";
      slider.max = String(Math.max(0, count - 1));
      slider.value = String(state.currentPhoto);
    }

    let sliderRaf = 0;
    document.getElementById("photoSlider").addEventListener("input", (e) => {
      state.currentPhoto = parseInt(e.target.value, 10) || 0;
      if (sliderRaf) return;
      sliderRaf = requestAnimationFrame(() => {
        sliderRaf = 0;
        loadPanorama(currentImageUrl(), true);
        renderPhotoControls();
      });
    });

    (async function boot() {
      const views = await discoverViews(state.project);
      if (!views.length) {
        showError(
          "No views found.<br><br>Expected one of:<br><code>" +
          escapeHtml(buildUrl(state.project, "view-1", "1.png")) +
          "</code><br>or<br><code>" +
          escapeHtml(buildUrl(state.project, "view-1", "1 .png")) +
          "</code>"
        );
        return;
      }
      state.views = views;
      for (let i = 0; i < views.length; i++) {
        const v = views[i];
        state.photosPerView[i] = await countPhotosInView(state.project, v.index, v.spaceBeforeDot);
      }
      hideStatus();
      document.getElementById("photoBar").style.display = "flex";
      await loadPanorama(currentImageUrl(), false);
      renderViewDots();
      renderPhotoControls();
      preloadAllPanoramas();
    })().catch((err) => {
      showError("Error: " + escapeHtml(String(err && err.message ? err.message : err)));
    });
  </script>
</body>
</html>
