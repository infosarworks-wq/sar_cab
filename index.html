<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SAR Cabinets Showcase</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.css" />
  <style>
    :root {
      --ui-bg: rgba(20, 20, 22, 0.82);
      --dot: #f5f5f5;
      --dot-active: #e53935;
      --border: rgba(255, 255, 255, 0.15);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #111;
      color: #eee;
      overflow: hidden;
    }
    #viewer { width: 100%; height: 100%; }
    .chrome {
      position: fixed;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .chrome-inner {
      pointer-events: auto;
      background: var(--ui-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }
    #viewBar { top: 16px; }
    #photoBar { bottom: 20px; }
    .label {
      font-size: 12px;
      opacity: 0.75;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 4px;
    }
    .dots {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: min(90vw, 720px);
    }
    button.dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.5);
      background: var(--dot);
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
    }
    button.dot:hover { transform: scale(1.15); }
    button.dot.active {
      background: var(--dot-active);
      border-color: #ff7961;
      box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.35);
    }
    #photoSlider {
      width: min(320px, 45vw);
      accent-color: var(--dot-active);
    }
    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      background: var(--ui-bg);
      border: 1px solid var(--border);
      padding: 20px 28px;
      border-radius: 12px;
      max-width: 90vw;
      text-align: center;
      line-height: 1.5;
    }
    #status.error { border-color: #c62828; }
    #status.hidden { display: none; }
  </style>
</head>
<body>
  <div id="status">Loading…</div>
  <div id="viewer"></div>

  <div id="viewBar" class="chrome" style="display:none;">
    <div class="chrome-inner">
      <span class="label">Views</span>
      <div id="viewDots" class="dots"></div>
    </div>
  </div>

  <div id="photoBar" class="chrome" style="display:none;">
    <div class="chrome-inner">
      <span class="label">Photos</span>
      <input type="range" id="photoSlider" min="0" max="0" value="0" />
      <div id="photoDots" class="dots"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.js"></script>
  <script>
    (function () {
      var BUCKET_BASE = 'https://storage.googleapis.com/sar_cab';
      var MAX_VIEWS = 32;
      var MAX_PHOTOS = 200;

      var viewer = null;
      var currentPrepared = null;
      var loadToken = 0;

      var state = {
        project: getQueryParam('project'),
        views: [],
        photosPerView: [],
        currentView: 0,
        currentPhoto: 0
      };

      if (!state.project) {
        showError(
          'Missing <strong>?project=</strong> in the link.<br><br>' +
          '<code>https://infosarworks-wq.github.io/sar_cab/?project=sample-cabinets</code>'
        );
        return;
      }

      function getQueryParam(name) {
        try {
          var params = new URLSearchParams(window.location.search);
          var v = params.get(name);
          return v ? String(v).trim() : '';
        } catch (e) {
          return '';
        }
      }

      function showError(html) {
        var s = document.getElementById('status');
        s.className = 'error';
        s.innerHTML = html;
      }

      function hideStatus() {
        document.getElementById('status').className = 'hidden';
      }

      function buildUrl(project, viewFolder, fileName) {
        var base = BUCKET_BASE.replace(/\/+$/, '');
        return base + '/' + [project, viewFolder, fileName].map(function (s) {
          return encodeURIComponent(String(s));
        }).join('/');
      }

      function photoFileName(i, spaceBeforeDot) {
        return spaceBeforeDot ? (i + ' .png') : (i + '.png');
      }

      function resourceExists(url) {
        return fetch(url, { method: 'HEAD', mode: 'cors', credentials: 'omit' })
          .then(function (r) {
            if (r.ok) return true;
            return fetch(url, { method: 'GET', mode: 'cors', credentials: 'omit' }).then(function (r2) {
              if (!r2.ok) return false;
              if (r2.body && r2.body.cancel) r2.body.cancel();
              return true;
            });
          })
          .catch(function () { return false; });
      }

      function discoverViews(project) {
        var views = [];
        var chain = Promise.resolve();
        for (var v = 1; v <= MAX_VIEWS; v++) {
          (function (viewIndex) {
            chain = chain.then(function () {
              var folder = 'view-' + viewIndex;
              return resourceExists(buildUrl(project, folder, '1.png')).then(function (okPlain) {
                if (okPlain) {
                  views.push({ index: viewIndex, spaceBeforeDot: false });
                  return;
                }
                return resourceExists(buildUrl(project, folder, '1 .png')).then(function (okSpace) {
                  if (okSpace) views.push({ index: viewIndex, spaceBeforeDot: true });
                });
              });
            });
          })(v);
        }
        return chain.then(function () { return views; });
      }

      function countPhotosInView(project, viewIndex, spaceBeforeDot) {
        var n = 0;
        var step = function (i) {
          if (i > MAX_PHOTOS) return Promise.resolve(n);
          var url = buildUrl(project, 'view-' + viewIndex, photoFileName(i, spaceBeforeDot));
          return resourceExists(url).then(function (ok) {
            if (!ok) return n;
            n = i;
            return step(i + 1);
          });
        };
        return step(1);
      }

      function currentImageUrl() {
        var meta = state.views[state.currentView];
        return buildUrl(
          state.project,
          'view-' + meta.index,
          photoFileName(state.currentPhoto + 1, meta.spaceBeforeDot)
        );
      }

      function getMaxTextureSize() {
        try {
          var c = document.createElement('canvas');
          var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
          return gl ? (gl.getParameter(gl.MAX_TEXTURE_SIZE) || 8192) : 8192;
        } catch (e) {
          return 8192;
        }
      }

      function preparePanoramaUrl(url) {
        return new Promise(function (resolve, reject) {
          var img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function () {
            var max = getMaxTextureSize();
            if (img.width <= max && img.height <= max) {
              resolve({ url: url, revoke: null });
              return;
            }
            var scale = Math.min(max / img.width, max / img.height);
            var w = Math.max(1, Math.floor(img.width * scale));
            var h = Math.max(1, Math.floor(img.height * scale));
            var canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext('2d');
            if (!ctx) {
              reject(new Error('Could not create resize context.'));
              return;
            }
            ctx.drawImage(img, 0, 0, w, h);
            canvas.toBlob(function (blob) {
              if (!blob) {
                reject(new Error('Could not create resized image.'));
                return;
              }
              var blobUrl = URL.createObjectURL(blob);
              resolve({
                url: blobUrl,
                revoke: function () { URL.revokeObjectURL(blobUrl); }
              });
            }, 'image/jpeg', 0.92);
          };
          img.onerror = function () { reject(new Error('Image could not be preloaded.')); };
          img.src = url;
        });
      }

      function loadPanorama(url, preserveOrientation) {
        var token = ++loadToken;
        var position = null;
        var zoom = null;
        if (preserveOrientation && viewer) {
          position = viewer.getPosition();
          zoom = viewer.getZoomLevel();
        }

        preparePanoramaUrl(url)
          .then(function (prepared) {
            if (token !== loadToken) {
              if (prepared.revoke) prepared.revoke();
              return;
            }

            var previousRevoke = currentPrepared ? currentPrepared.revoke : null;
            currentPrepared = prepared;

            if (!viewer) {
              viewer = new PhotoSphereViewer.Viewer({
                container: document.getElementById('viewer'),
                panorama: prepared.url,
                navbar: ['zoom', 'move', 'fullscreen']
              });
              if (previousRevoke) previousRevoke();
              return;
            }

            viewer.setPanorama(prepared.url, {
              transition: false,
              showLoader: true,
              position: position || undefined,
              zoom: zoom || undefined
            }).then(function () {
              if (previousRevoke) previousRevoke();
            });
          })
          .catch(function (err) {
            if (token !== loadToken) return;
            showError(
              'Could not load this image.<br><br><code style="word-break:break-all;">' + url + '</code><br><br>' +
              String(err && err.message ? err.message : err)
            );
          });
      }

      function renderViewDots() {
        var wrap = document.getElementById('viewDots');
        wrap.innerHTML = '';
        if (state.views.length <= 1) {
          document.getElementById('viewBar').style.display = 'none';
          return;
        }
        document.getElementById('viewBar').style.display = 'flex';
        for (var i = 0; i < state.views.length; i++) {
          (function (idx) {
            var b = document.createElement('button');
            b.className = 'dot' + (idx === state.currentView ? ' active' : '');
            b.addEventListener('click', function () { switchView(idx); });
            wrap.appendChild(b);
          })(i);
        }
      }

      function renderPhotoControls() {
        var count = state.photosPerView[state.currentView];
        var slider = document.getElementById('photoSlider');
        slider.min = 0;
        slider.max = Math.max(0, count - 1);
        slider.value = state.currentPhoto;
        var dots = document.getElementById('photoDots');
        dots.innerHTML = '';
        for (var i = 0; i < count; i++) {
          (function (idx) {
            var b = document.createElement('button');
            b.className = 'dot' + (idx === state.currentPhoto ? ' active' : '');
            b.addEventListener('click', function () {
              state.currentPhoto = idx;
              loadPanorama(currentImageUrl(), true);
              renderPhotoControls();
            });
            dots.appendChild(b);
          })(i);
        }
      }

      function switchView(idx) {
        state.currentView = idx;
        state.currentPhoto = 0;
        loadPanorama(currentImageUrl(), false);
        renderViewDots();
        renderPhotoControls();
      }

      document.getElementById('photoSlider').addEventListener('input', function (e) {
        state.currentPhoto = parseInt(e.target.value, 10) || 0;
        loadPanorama(currentImageUrl(), true);
        renderPhotoControls();
      });

      discoverViews(state.project).then(function (views) {
        if (!views.length) {
          showError(
            'No views found.<br><br>Expected one of:<br><code>' + buildUrl(state.project, 'view-1', '1.png') +
            '</code><br>or<br><code>' + buildUrl(state.project, 'view-1', '1 .png') + '</code>'
          );
          return;
        }
        state.views = views;
        var seq = Promise.resolve();
        for (var i = 0; i < views.length; i++) {
          (function (vi) {
            seq = seq.then(function () {
              var v = views[vi];
              return countPhotosInView(state.project, v.index, v.spaceBeforeDot).then(function (count) {
                state.photosPerView[vi] = count;
              });
            });
          })(i);
        }
        return seq.then(function () {
          hideStatus();
          document.getElementById('photoBar').style.display = 'flex';
          loadPanorama(currentImageUrl(), false);
          renderViewDots();
          renderPhotoControls();
        });
      }).catch(function (err) {
        showError('Error: ' + String(err && err.message ? err.message : err));
      });
    })();
  </script>
</body>
</html>

      <span class="label">Views</span>
      <div id="viewDots" class="dots"></div>
    </div>
  </div>

  <div id="photoBar" class="chrome" style="display: none;">
    <div class="chrome-inner">
      <span class="label">Photos</span>
      <input type="range" id="photoSlider" min="0" max="0" value="0" />
      <div id="photoDots" class="dots"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script>
(function () {
  // ============ COPY: set your bucket base (no trailing slash) ============
  var BUCKET_BASE = 'https://storage.googleapis.com/sar_cab';

  // How many views / photos to try before stopping (safety limits)
  var MAX_VIEWS = 32;
  var MAX_PHOTOS = 200;

  function getQueryParam(name) {
    try {
      var params = new URLSearchParams(window.location.search);
      var v = params.get(name);
      return v ? String(v).trim() : '';
    } catch (e) {
      return '';
    }
  }

  /** Project folder inside the bucket, e.g. sample-cabinets or "sample cabinets" */
  var projectFolder = getQueryParam('project');
  if (!projectFolder) {
    showError(
      'Missing <strong>?project=</strong> in the link.<br><br>' +
      'Example:<br><code style="word-break:break-all;">' +
      escapeHtml('https://infosarworks-wq.github.io/sar_cab/?project=sample%20cabinets') +
      '</code><br><br>' +
      'Use the folder name exactly as it appears in your bucket (e.g. <code>sample%20cabinets</code> for a space).'
    );
    return;
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function showError(html) {
    var el = document.getElementById('status');
    el.className = 'error';
    el.innerHTML = html;
  }

  function hideStatus() {
    var el = document.getElementById('status');
    el.className = 'hidden';
  }

  /** Same CORS rules as panorama fetch — do not use Image+crossOrigin here (it falsely fails). */
  function resourceExists(url) {
    return fetch(url, { method: 'HEAD', mode: 'cors', credentials: 'omit' })
      .then(function (res) {
        if (res.ok) return true;
        return fetch(url, { method: 'GET', mode: 'cors', credentials: 'omit' }).then(function (r) {
          if (!r.ok) return false;
          if (r.body && r.body.cancel) r.body.cancel();
          return true;
        });
      })
      .catch(function () {
        return new Promise(function (resolve) {
          var img = new Image();
          img.onload = function () { resolve(true); };
          img.onerror = function () { resolve(false); };
          img.src = url;
        });
      });
  }

  function buildUrl(project, viewFolder, fileName) {
    var base = BUCKET_BASE.replace(/\/+$/, '');
    var segments = [project, viewFolder, fileName];
    return base + '/' + segments.map(function (s) {
      return encodeURIComponent(String(s));
    }).join('/');
  }

  function photoFileName(index, spaceBeforeDot) {
    return spaceBeforeDot ? (index + ' .png') : (index + '.png');
  }

  function discoverViews(project) {
    var views = [];
    var chain = Promise.resolve();
    for (var v = 1; v <= MAX_VIEWS; v++) {
      (function (viewIndex) {
        chain = chain.then(function () {
          var folder = 'view-' + viewIndex;
          return resourceExists(buildUrl(project, folder, '1.png')).then(function (okPlain) {
            if (okPlain) {
              views.push({ index: viewIndex, spaceBeforeDot: false });
              return;
            }
            return resourceExists(buildUrl(project, folder, '1 .png')).then(function (okSpace) {
              if (okSpace) views.push({ index: viewIndex, spaceBeforeDot: true });
            });
          });
        });
      })(v);
    }
    return chain.then(function () { return views; });
  }

  function countPhotosInView(project, viewIndex, spaceBeforeDot) {
    var n = 0;
    var step = function (i) {
      if (i > MAX_PHOTOS) return Promise.resolve(n);
      var url = buildUrl(project, 'view-' + viewIndex, photoFileName(i, spaceBeforeDot));
      return resourceExists(url).then(function (ok) {
        if (!ok) return n;
        n = i;
        return step(i + 1);
      });
    };
    return step(1);
  }

  var viewer = null;
  var loadToken = 0;
  var activeBlobRevoke = null;

  var state = {
    project: projectFolder,
    views: [],
    photosPerView: [],
    currentView: 0,
    currentPhoto: 0,
    preloaded: {}
  };

  function preloadViewPhotos(viewIdx) {
    var count = state.photosPerView[viewIdx];
    var project = state.project;
    var meta = state.views[viewIdx];
    var vnum = meta.index;
    var space = meta.spaceBeforeDot;
    var key = project + '/view-' + vnum;
    if (state.preloaded[key]) return;
    var promises = [];
    for (var i = 1; i <= count; i++) {
      promises.push(resourceExists(buildUrl(project, 'view-' + vnum, photoFileName(i, space))));
    }
    return Promise.all(promises).then(function () {
      state.preloaded[key] = true;
    });
  }

  function getSceneOrientation() {
    if (!viewer) return { pitch: 0, yaw: 0, hfov: 100 };
    return {
      pitch: viewer.getPitch(),
      yaw: viewer.getYaw(),
      hfov: viewer.getHfov()
    };
  }

  function getMaxTextureSize() {
    try {
      var c = document.createElement('canvas');
      var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
      if (!gl) return 8192;
      return gl.getParameter(gl.MAX_TEXTURE_SIZE) || 8192;
    } catch (e) {
      return 8192;
    }
  }

  function downscaleIfNeeded(httpsUrl) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        var maxTex = getMaxTextureSize();
        if (img.width <= maxTex && img.height <= maxTex) {
          resolve({ url: httpsUrl, revoke: null });
          return;
        }

        var scale = Math.min(maxTex / img.width, maxTex / img.height);
        var w = Math.max(1, Math.floor(img.width * scale));
        var h = Math.max(1, Math.floor(img.height * scale));
        var canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        if (!ctx) {
          reject(new Error('Could not create canvas context for resize.'));
          return;
        }
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(function (blob) {
          if (!blob) {
            reject(new Error('Could not create resized panorama blob.'));
            return;
          }
          var blobUrl = URL.createObjectURL(blob);
          resolve({
            url: blobUrl,
            revoke: function () { URL.revokeObjectURL(blobUrl); }
          });
        }, 'image/jpeg', 0.92);
      };
      img.onerror = function () {
        reject(new Error('Image preload failed before resize.'));
      };
      img.src = httpsUrl;
    });
  }

  function mainSceneConfigForDisplay(panoramaUrl, o) {
    return {
      title: 'main',
      type: 'equirectangular',
      panorama: panoramaUrl,
      crossOrigin: 'anonymous',
      pitch: o.pitch,
      yaw: o.yaw,
      hfov: o.hfov
    };
  }

  function loadPanoramaUrl(httpsUrl, preserve) {
    var o = preserve ? getSceneOrientation() : { pitch: 0, yaw: 0, hfov: 100 };
    var token = ++loadToken;
    downscaleIfNeeded(httpsUrl)
      .then(function (prepared) {
        if (token !== loadToken) {
          if (prepared.revoke) prepared.revoke();
          return;
        }
        if (activeBlobRevoke) {
          activeBlobRevoke();
          activeBlobRevoke = null;
        }
        if (prepared.revoke) activeBlobRevoke = prepared.revoke;

        if (!viewer) {
          viewer = pannellum.viewer('panorama', {
            default: {
              firstScene: 'main',
              sceneFadeDuration: 0,
              crossOrigin: 'anonymous'
            },
            scenes: {
              main: mainSceneConfigForDisplay(prepared.url, o)
            }
          });
          return;
        }
        try {
          viewer.removeScene('main');
        } catch (e) { /* ignore */ }
        viewer.addScene('main', mainSceneConfigForDisplay(prepared.url, o));
        viewer.loadScene('main', o.pitch, o.yaw, o.hfov);
      })
      .catch(function (err) {
        if (token !== loadToken) return;
        showError(
          'Could not load this image in the 360 viewer.<br><br>' +
          '<code style="word-break:break-all;">' + escapeHtml(httpsUrl) + '</code><br><br>' +
          escapeHtml(String(err && err.message ? err.message : err))
        );
      });
  }

  function currentImageUrl() {
    var vi = state.currentView;
    var meta = state.views[vi];
    var vnum = meta.index;
    var p = state.currentPhoto + 1;
    return buildUrl(state.project, 'view-' + vnum, photoFileName(p, meta.spaceBeforeDot));
  }

  function renderViewDots() {
    var wrap = document.getElementById('viewDots');
    wrap.innerHTML = '';
    if (state.views.length <= 1) {
      document.getElementById('viewBar').style.display = 'none';
      return;
    }
    document.getElementById('viewBar').style.display = 'flex';
    for (var i = 0; i < state.views.length; i++) {
      (function (idx) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'dot' + (idx === state.currentView ? ' active' : '');
        b.setAttribute('aria-label', 'View ' + state.views[idx].index);
        b.addEventListener('click', function () { switchView(idx); });
        wrap.appendChild(b);
      })(i);
    }
  }

  function renderPhotoControls() {
    var count = state.photosPerView[state.currentView];
    var slider = document.getElementById('photoSlider');
    slider.min = 0;
    slider.max = Math.max(0, count - 1);
    slider.value = state.currentPhoto;
    var dots = document.getElementById('photoDots');
    dots.innerHTML = '';
    for (var i = 0; i < count; i++) {
      (function (idx) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'dot' + (idx === state.currentPhoto ? ' active' : '');
        b.setAttribute('aria-label', 'Photo ' + (idx + 1));
        b.addEventListener('click', function () {
          state.currentPhoto = idx;
          loadPanoramaUrl(currentImageUrl(), true);
          renderPhotoControls();
        });
        dots.appendChild(b);
      })(i);
    }
  }

  function switchView(idx) {
    state.currentView = idx;
    state.currentPhoto = 0;
    preloadViewPhotos(idx).then(function () {
      loadPanoramaUrl(currentImageUrl(), false);
      renderViewDots();
      renderPhotoControls();
    });
  }

  document.getElementById('photoSlider').addEventListener('input', function (e) {
    state.currentPhoto = parseInt(e.target.value, 10) || 0;
    loadPanoramaUrl(currentImageUrl(), true);
    renderPhotoControls();
  });

  discoverViews(projectFolder)
    .then(function (views) {
      if (!views.length) {
        showError(
          'No views found. Expected <code>view-1/1.png</code> <strong>or</strong> <code>view-1/1 .png</code>:<br>' +
          '<code style="word-break:break-all;">' +
          escapeHtml(buildUrl(projectFolder, 'view-1', '1.png')) +
          '</code><br>or<br><code style="word-break:break-all;">' +
          escapeHtml(buildUrl(projectFolder, 'view-1', '1 .png')) +
          '</code><br><br>' +
          'Check the <code>?project=</code> folder name, bucket permissions, and that files are public.'
        );
        return;
      }
      state.views = views;
      var seq = Promise.resolve();
      for (var i = 0; i < views.length; i++) {
        (function (vi) {
          seq = seq.then(function () {
            var v = views[vi];
            return countPhotosInView(projectFolder, v.index, v.spaceBeforeDot).then(function (c) {
              state.photosPerView[vi] = c;
            });
          });
        })(i);
      }
      return seq.then(function () {
        for (var j = 0; j < state.photosPerView.length; j++) {
          if (!state.photosPerView[j]) {
            showError('View ' + state.views[j].index + ' has no numbered photos (1.png or 1 .png, then 2.png or 2 .png, …).');
            return;
          }
        }
        hideStatus();
        document.getElementById('photoBar').style.display = 'flex';
        return preloadViewPhotos(0).then(function () {
          loadPanoramaUrl(currentImageUrl(), false);
          renderViewDots();
          renderPhotoControls();
        });
      });
    })
    .catch(function (err) {
      showError('Error: ' + escapeHtml(String(err && err.message ? err.message : err)));
    });
})();
  </script>
</body>
</html>
